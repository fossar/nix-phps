name: EditorConfig checks

on:
  pull_request:

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check files for EditorConfig compliance
        uses: editorconfig-checker/action-editorconfig-checker@1a8ea00bde2ec25afe074a2cdc15b1fd7fb60a39 # untagged main
        with:
          version: 2.7.0
